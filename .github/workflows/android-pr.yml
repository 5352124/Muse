name: Android PR Check

# PR 检查工作流 — 提交 pull_request 时触发
# 通过编译检查 + 单元测试作为合并门禁,任一失败阻止合并
# (仓库设置中需把本工作流设为 Status Check 必选项)
on:
  pull_request:
    branches:
      - main
      - master
      - develop

# 同一 PR 上的多次提交只保留最新一次的检查
concurrency:
  group: android-pr-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  check:
    name: Compile & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write  # 上传测试报告所需权限
    steps:
      # 1. 拉取 PR 代码(基于 merge commit,GitHub 自动生成)
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 配置 JDK 17(项目 compileOptions 要求 Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # actions/setup-java 内置 gradle 缓存

      # 3. 配置 Android SDK(避免 runner 镜像 SDK 版本不匹配)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;35.0.0

      # 4. 授予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 5. Kotlin 编译检查(debug 变体) — 快速发现类型错误/未解析引用
      #    只编译不打包,失败立即返回,无需走完整 assembleDebug
      - name: Compile debug Kotlin
        run: ./gradlew compileDebugKotlin --stacktrace --no-daemon

      # 6. 运行单元测试 — 关键业务逻辑不回归
      #    覆盖 ai/core 模块(ChatStreamEvent/ProviderConfig/Serialization/UIMessage)与 app 模块测试
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      # 7. 失败时上传测试报告便于排查(默认 artifact 保留 14 天)
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-reports-${{ github.event.pull_request.number }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14
          if-no-files-found: ignore
