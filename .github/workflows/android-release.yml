name: Android Release

# 发布构建工作流 — 触发条件:推送 v*.*.* 格式 tag 或手动触发
# 产物:3 个 ABI(arm64-v8a / armeabi-v7a / universal)的签名 release APK
# 上传:GitHub Release 附 APK + 单独 artifact 上传便于下载
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本号(用于 Release 标题,无需 v 前缀)'
        required: false
        default: ''

# 取消同一分支/标签上正在运行的旧工作流,避免重复构建
concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build APK (${{ matrix.abi }})
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 创建 GitHub Release 所需权限
    strategy:
      fail-fast: false  # 单个 ABI 失败不影响其他 ABI 继续(便于排查)
      matrix:
        abi: [arm64-v8a, armeabi-v7a, universal]
    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 配置 JDK 17(项目 compileOptions 要求 Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 缓存 Gradle 依赖与 wrapper(命中后构建时间可缩短 50%+)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ matrix.abi }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-release-${{ runner.os }}-${{ matrix.abi }}-
            gradle-release-${{ runner.os }}-

      # 5. 授予 gradlew 执行权限(Linux runner 默认无)
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 6. 解码签名 keystore(从 GitHub Secrets 读取 base64 编码的 .jks/.keystore 文件)
      #    并生成 keystore.properties(app/build.gradle.kts 中 signingConfigs.release 会读取)
      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::未配置签名 Secrets(KEYSTORE_BASE64 为空),将使用 debug keystore 回退签名"
            mkdir -p ~/.config/.android
            keytool -genkey -v \
              -keystore ~/.config/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "storeFile=$HOME/.config/.android/debug.keystore" > keystore.properties
            echo "storePassword=android" >> keystore.properties
            echo "keyAlias=androiddebugkey" >> keystore.properties
            echo "keyPassword=android" >> keystore.properties
          else
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "storeFile=$PWD/release.keystore" > keystore.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
            echo "keyAlias=$KEY_ALIAS" >> keystore.properties
            echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
            echo "::notice::已加载正式签名 keystore"
          fi

      # 7. 构建 release APK(app/build.gradle.kts 的 splits.abi 配置会同时生成 3 个 APK)
      #    每个 matrix 任务都会执行完整构建,上传步骤只取对应 ABI 的 APK
      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      # 8. 上传对应 ABI 的 APK 作为 workflow artifact(便于审查期下载)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: muse-release-${{ matrix.abi }}
          path: app/build/outputs/apk/release/app-${{ matrix.abi }}-release.apk
          retention-days: 30
          if-no-files-found: error

      # 9. 失败时上传构建报告便于排查(test/lint/compile 各阶段报告都会被打包)
      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ matrix.abi }}
          path: |
            app/build/reports/
            **/build/reports/tests/
            **/build/reports/lint-results-*.html
          retention-days: 14
          if-no-files-found: ignore

  # 单独的发布任务:等待 3 个 ABI 全部构建成功后,创建 GitHub Release 并附加全部 APK
  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 下载全部 3 个 ABI 的 APK 到本地 staging 目录
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: muse-release-*
          merge-multiple: true
          path: apks

      # 列出下载的 APK(便于在 Actions 日志中确认产物)
      - name: List APK files
        run: ls -lh apks/

      # 创建 GitHub Release 并附加全部 APK(softprops/action-gh-release)
      # tag_name 自动取触发本工作流的 git tag
      - name: Create GitHub Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Muse ${{ github.ref_name }}
          generate_release_notes: true  # 自动从 commit 历史生成变更说明
          fail_on_unmatched_files: true
          files: |
            apks/app-arm64-v8a-release.apk
            apks/app-armeabi-v7a-release.apk
            apks/app-universal-release.apk
